<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Live Call - private chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📹</text></svg>">
    <style>
        /* --- VARIABLES & RESET --- */
        :root {
            --primary: #7b2cbf;
            --secondary: #3a0ca3;
            --accent: #4cc9f0;
            --danger: #ef233c;
            --success: #06d6a0;
            --dark: #0a001a;
            --glass: rgba(20, 20, 35, 0.65);
            --glass-heavy: rgba(10, 10, 20, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: #fff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LAYOUT SPLIT SCREEN --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* --- LEFT SIDE: VIDEO FEED (The "Caller") --- */
        .video-feed-side {
            flex: 1.5; /* Lebih lebar */
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .caller-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transform: scale(1.05); /* Sedikit zoom untuk menghilangkan border hitam */
        }

        /* Overlay pada Video */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .live-badge {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(239, 35, 60, 0.8);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex; align-items: center; gap: 6px;
            z-index: 3;
            backdrop-filter: blur(4px);
        }
        .rec-dot {
            width: 8px; height: 8px; background: #fff; border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .connection-status {
            position: absolute;
            top: 20px; right: 20px;
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: rgba(255,255,255,0.8);
            z-index: 3;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px; border-radius: 12px;
        }

        /* --- RIGHT SIDE: CALL INTERFACE (Controls) --- */
        .interface-side {
            flex: 1;
            background: var(--glass-heavy);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            z-index: 10;
            position: relative;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        /* Profile dalam Interface */
        .caller-profile-card {
            text-align: center;
            margin-bottom: 40px;
            animation: float 6s ease-in-out infinite;
        }

        .profile-ring-anim {
            width: 120px; height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(from 0deg, var(--primary), var(--accent), var(--primary));
            margin: 0 auto 15px auto;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            animation: spinBorder 4s linear infinite;
        }
        
        .profile-img-small {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--dark);
            background: #222;
        }

        .caller-name { font-size: 24px; font-weight: 700; margin-bottom: 5px; color: #fff; }
        .caller-status { font-size: 14px; color: var(--accent); display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Chat Preview Bubble */
        .chat-bubble {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 0 15px 15px 15px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
            max-width: 220px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            position: relative;
        }
        .chat-bubble::after {
            content:''; position: absolute; top:0; left:-6px;
            width:0; height:0; border-top:10px solid transparent;
            border-bottom:0px solid transparent; border-right:10px solid rgba(255,255,255,0.05);
        }

        /* --- ACTION BUTTONS --- */
        .call-actions {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 320px;
            align-items: center;
        }

        .control-btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .control-btn:active { transform: scale(0.9); }

        /* Main Answer Button */
        .answer-btn {
            grid-column: 2;
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--success), #059669);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(6, 214, 160, 0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            z-index: 2;
        }
        .answer-btn span { font-size: 10px; font-weight: 600; margin-top: 2px; text-transform: uppercase; }
        .answer-btn::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid var(--success);
            opacity: 0; animation: pulseRing 2s infinite;
        }

        .decline-btn { background: var(--danger); }

        /* --- TOAST NOTIFICATIONS (Video Call Style) --- */
        .toast-wrapper {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; gap: 10px;
            width: 90%; max-width: 400px; pointer-events: none;
        }
        
        .call-toast {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        .call-toast.active { transform: translateY(0); opacity: 1; }
        .toast-icon-box {
            width: 35px; height: 35px; background: rgba(76, 201, 240, 0.15);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            color: var(--accent);
        }
        .toast-content h5 { font-size: 13px; font-weight: 600; color: #fff; }
        .toast-content p { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }

        /* --- ANIMATIONS --- */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes spinBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseRing { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- RESPONSIVE DESIGN (Mobile View) --- */
        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .video-feed-side { flex: 1; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
            .interface-side { 
                flex: none; 
                width: 100%; 
                height: auto; 
                position: absolute; bottom: 0; left: 0;
                padding: 20px 20px 40px 20px;
                background: linear-gradient(to top, rgba(10,0,26,0.95) 20%, rgba(10,0,26,0.8) 60%, transparent 100%);
                border-left: none;
                backdrop-filter: none;
                border-top: 1px solid rgba(255,255,255,0.1);
                border-radius: 30px 30px 0 0;
            }
            .caller-profile-card { 
                display: flex; flex-direction: column-reverse; 
                align-items: center; margin-bottom: 20px; 
                text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            }
            .profile-ring-anim { width: 80px; height: 80px; margin-bottom: 10px; }
            .caller-name { font-size: 22px; }
            .chat-bubble { display: none; /* Hide chat bubble on mobile to save space */ }
            .control-btn { background: rgba(0,0,0,0.4); }
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <!-- Main App Container -->
    <div class="app-container">
        
        <!-- LEFT SIDE: Video Feed (The Caller) -->
        <div class="video-feed-side">
            <!-- Fallback Background -->
            <div style="position: absolute; inset: 0; background: #240046; z-index: -1;"></div>
            
            <!-- Video Element -->
            <video id="mainVideo" class="caller-video" autoplay muted loop playsinline preload="auto"></video>
            
            <!-- Overlays -->
            <div class="video-overlay"></div>
            
            <div class="live-badge">
                <div class="rec-dot"></div> Live Recording
            </div>
            
            <div class="connection-status">
                <i class="fas fa-wifi" style="color:var(--success)"></i> HD 720p • 12ms
            </div>
        </div>

        <!-- RIGHT SIDE: Interface Controls -->
        <div class="interface-side">
            
            <div class="caller-profile-card">
                <div class="profile-ring-anim">
                    <img id="profilePhoto" class="profile-img-small" src="" alt="Caller">
                </div>
                <h2 class="caller-name" id="callerName">Incoming Call...</h2>
                <div class="caller-status">
                    <i class="fas fa-map-marker-alt" style="font-size:10px;"></i> Nearby • 2km
                </div>
            </div>

            <!-- Chat Preview (Desktop Only mostly) -->
            <div class="chat-bubble">
                Hey! I saw you matched with me. Pick up! 🥰
            </div>

            <!-- Action Buttons -->
            <div class="call-actions">
                <button class="control-btn" onclick="handleClick()">
                    <i class="fas fa-volume-mute"></i>
                </button>
                
                <button class="control-btn answer-btn" id="answerBtn">
                    <i class="fas fa-phone-alt" style="font-size: 24px; margin-bottom:2px;"></i>
                    <span>Answer</span>
                </button>
                
                <button class="control-btn decline-btn" onclick="handleClick()">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>

            <div style="margin-top: 25px; text-align: center;">
                <p style="font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px;">
                    <i class="fas fa-shield-alt"></i> ENCRYPTED CALL
                </p>
            </div>

        </div>
    </div>

    <div class="toast-wrapper" id="toastContainer"></div>

    <script>
        document.addEventListener('contextmenu', e => { e.preventDefault(); return false; });
        document.addEventListener('keydown', e => {
            if([123,73,74,67,86,88,65,83,80,85].includes(e.keyCode) || (e.ctrlKey && [73,74,67,86,88,65,83,80,85].includes(e.keyCode))) {
                e.preventDefault(); return false;
            }
        });
        
        setInterval(function() {
            if(window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
                window.location.replace("about:blank");
            }
        }, 500);

        console.clear();
        setInterval(() => {
            console.clear();
            console.log("%cSecure Connection Established 🔒", "color: #4cc9f0; font-size: 20px; font-weight: bold;");
        }, 1000);

        const SMARTLINK = "https://ceafgif.flirtpixel.com/s/192278ad6a62d?sub1=PATRICK&subsource=PATRICK"; 
        let TARGET_URL = SMARTLINK;

        const profilePhotos = [
            "https://files.catbox.moe/blc5hs.png", 
            "https://files.catbox.moe/pjlwxp.jpg",
            "https://files.catbox.moe/p8q9ys.jpg",
            "https://files.catbox.moe/0y1tmh.jpg"
        ];

        const videoList = [
            "https://ceafgif.flirtpixel.com/bundle/921/assets/images/video-1.mp4",
            "https://files.catbox.moe/y2fr1u.mp4",
            "https://files.catbox.moe/jytnih.mp4",
            "https://files.catbox.moe/1q99k0.mp4"
        ];

        const names = ["Sarah", "Jessica", "Emily", "Sophia", "Olivia", "Emma", "Ava", "Isabella", "Mia", "Charlotte"];
        
        function getRandomItem(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
        function getRandomInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }

        // URL Parameter Handler
        const params = new URLSearchParams(window.location.search);
        let finalUrl = TARGET_URL + (params.toString() ? (TARGET_URL.includes('?') ? '&' : '?') + params.toString() : '');


        // --- 3. CORE LOGIC ---

        function doRedirect() { location.href = finalUrl; }

        // Video Setup
        const videoEl = document.getElementById('mainVideo');
        let videoIdx = 0;

        function playVideo() {
            videoEl.src = videoList[videoIdx];
            videoEl.play().catch(() => nextVideo());
            videoEl.onerror = nextVideo;
        }

        function nextVideo() {
            videoIdx = (videoIdx + 1) % videoList.length;
            if(videoIdx !== 0) playVideo();
        }

        // Toast System (Video Call Style)
        function showToast(title, msg, icon = 'fa-video') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'call-toast';
            toast.innerHTML = `
                <div class="toast-icon-box"><i class="fas ${icon}"></i></div>
                <div class="toast-content">
                    <h5>${title}</h5>
                    <p>${msg}</p>
                </div>
            `;
            container.appendChild(toast);
            
            // Trigger Animation
            setTimeout(() => toast.classList.add('active'), 10);
            setTimeout(() => {
                toast.classList.remove('active');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Tracking
            fetch('https://imopol.dasboardkramat.workers.dev/track?cid=PATRICK', { method: 'GET', keepalive: true });

            // Setup Video & Content
            videoIdx = getRandomInt(0, videoList.length - 1);
            playVideo();

            document.getElementById('callerName').textContent = getRandomItem(names);
            document.getElementById('profilePhoto').src = getRandomItem(profilePhotos);

            // Interaction Logic
            const btn = document.getElementById('answerBtn');
            
            window.handleClick = function() {
                // Visual feedback
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Connecting</span>';
                btn.style.animation = 'none';
                
                // Show "Connecting" toast
                showToast("Connecting", "Establishing secure P2P line...", "fa-satellite-dish");

                setTimeout(doRedirect, 1200);
            };

            btn.onclick = window.handleClick;
            
            // Ensure video plays on interaction
            document.body.onclick = (e) => {
                // Jika klik bukan pada tombol answer
                if(!e.target.closest('.answer-btn') && !e.target.closest('.control-btn')) {
                    if(videoEl.paused) videoEl.play().catch(()=>{});
                }
            };

            // Simulate Call Notifications
            setTimeout(() => {
                showToast("Incoming Call", "Video request from nearby user...", "fa-phone-volume");
                // Play sound logic here if needed
            }, 1000);

            setTimeout(() => {
                showToast("HD Ready", "Camera connection optimized", "fa-check-circle");
            }, 4000);
        });

        // Auto Redirect Timer (9 detik)
        setTimeout(() => { doRedirect(); }, 9000);

    </script>
</body>
</html>
